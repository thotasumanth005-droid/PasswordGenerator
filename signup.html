<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    font-family: "Segoe UI", sans-serif;
    box-sizing: border-box;
}

body{
    margin:0;
    height:100vh;
    background: linear-gradient(135deg,#0b1025,#1b2a5a);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    width:360px;
    background:#eaf4ff;
    padding:30px;
    border-radius:24px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

h2{
    margin-bottom:20px;
}

/* INPUTS */
label{
    font-weight:500;
    display:block;
    margin-top:14px;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    margin-top:6px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
}

.password-box{
    display:flex;
    gap:10px;
}

.password-box button{
    border:none;
    border-radius:14px;
    padding:0 16px;
    cursor:pointer;
    background:#ffffff;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* OPTIONS */
.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    margin:16px 0;
    font-size:15px;
}

/* SLIDER */
.range-text{
    font-weight:500;
    margin-top:10px;
}

input[type="range"]{
    width:100%;
    margin-top:6px;
}

/* BUTTONS */
.generate{
    width:100%;
    padding:14px;
    background:#6f86ff;
    color:white;
    border:none;
    border-radius:16px;
    font-size:16px;
    margin-top:18px;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.strength{
    margin:16px 0;
    font-weight:600;
}

#strength{
    color:green;
}

.actions{
    display:flex;
    gap:12px;
}

.copy{
    flex:1;
    padding:14px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

.signup{
    flex:1;
    padding:14px;
    background:#6f86ff;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email">

    <label>Password</label>
    <div class="password-box">
        <input type="password" id="password" placeholder="••••••••">
        <button onclick="togglePassword()">👁️</button>
    </div>

    <div class="options">
        <label><input type="checkbox" id="upper" checked> Uppercase</label>
        <label><input type="checkbox" id="lower" checked> Lowercase</label>
        <label><input type="checkbox" id="number" checked> Numbers</label>
        <label><input type="checkbox" id="symbol" checked> Symbols</label>
    </div>

    <div class="range-text">
        Password Length: <span id="lenVal">9</span>
    </div>
    <input type="range" id="length" min="6" max="20" value="9">

    <button class="generate" onclick="generatePassword()">Generate Password</button>

    <div class="strength">
        Strength: <span id="strength">Strong</span>
    </div>

    <div class="actions">
        <button class="copy" onclick="copyPassword()">Copy Password</button>
        <button class="signup">Sign Up</button>
    </div>
</div>

<script>
const lengthSlider = document.getElementById("length");
const lenVal = document.getElementById("lenVal");
const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("strength");

lenVal.textContent = lengthSlider.value;

lengthSlider.oninput = () => {
    lenVal.textContent = lengthSlider.value;
};

function generatePassword(){
    let chars="";
    if(upper.checked) chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if(lower.checked) chars+="abcdefghijklmnopqrstuvwxyz";
    if(number.checked) chars+="0123456789";
    if(symbol.checked) chars+="!@#$%^&*()_+";

    let pass="";
    for(let i=0;i<lengthSlider.value;i++){
        pass += chars[Math.floor(Math.random()*chars.length)];
    }
    passwordInput.value=pass;
    updateStrength(pass);
}

function updateStrength(pass){
    if(pass.length>=12){
        strengthText.textContent="Strong";
        strengthText.style.color="green";
    }else if(pass.length>=8){
        strengthText.textContent="Medium";
        strengthText.style.color="orange";
    }else{
        strengthText.textContent="Weak";
        strengthText.style.color="red";
    }
}

function togglePassword(){
    passwordInput.type =
        passwordInput.type==="password" ? "text" : "password";
}

function copyPassword(){
    navigator.clipboard.writeText(passwordInput.value);
    alert("Password copied!");
}
</script>

</body>
</html>
